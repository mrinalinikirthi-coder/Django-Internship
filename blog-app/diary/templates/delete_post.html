{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> Delete Post
            </div>
            <div class="card-body text-center">
                <p class="lead">Are you sure you want to delete this post?</p>
                <div class="alert alert-secondary">
                    <strong>{{ post.title }}</strong>
                    <p class="mt-2 text-muted">{{ post.content|truncatewords:30 }}</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, Delete
                    </button>
                    <a href="{% url 'single_post' post.id %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
